name: Build & Push Hermes Enhanced Image

# 每周构建一次增强版 Hermes 镜像：跟踪 NousResearch/hermes-agent 最新 release，
# 在其官方多架构镜像上叠加 vim / tmux / glab / claude code，推送到 GHCR。
on:
  schedule:
    # 每周一 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "强制使用的 hermes-agent release tag（留空则自动取最新 release）"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "scripts/smoke-test.sh"

env:
  REGISTRY: ghcr.io
  # 推送目标镜像名（小写 owner/repo）
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: NousResearch/hermes-agent

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析 hermes-agent release tag
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          INPUT="${{ github.event.inputs.hermes_version }}"
          if [ -n "${INPUT}" ]; then
            TAG="${INPUT}"
            echo "使用手动指定的 tag: ${TAG}"
          else
            TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq .tag_name)"
            echo "自动解析到最新 release: ${TAG}"
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "::error::无法解析 hermes-agent release tag"; exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 归一化镜像名为小写
        id: img
        run: |
          echo "name=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) 先只构建 runner 原生架构(amd64)并 load 到本地，跑冒烟测试
      - name: 构建测试镜像 (amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            HERMES_VERSION=${{ steps.ver.outputs.tag }}
          tags: hermes-enhanced:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 冒烟测试
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh hermes-enhanced:smoke

      # 2) 冒烟通过后，登录 GHCR 并多架构 build & push
      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 多架构构建并推送 (amd64 + arm64)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            HERMES_VERSION=${{ steps.ver.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.ver.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hermes Agent enhanced with vim/tmux/glab/claude-code (base ${{ steps.ver.outputs.tag }})
            org.opencontainers.image.base.name=docker.io/nousresearch/hermes-agent:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建摘要
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### ✅ 已推送增强镜像"
            echo ""
            echo "- 基础 release: \`${{ steps.ver.outputs.tag }}\`"
            echo "- 镜像: \`${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.ver.outputs.tag }}\`"
            echo "- 镜像: \`${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest\`"
            echo "- 架构: linux/amd64, linux/arm64"
          } >> "$GITHUB_STEP_SUMMARY"
