name: Build & Push Hermes Enhanced Image

# 每周构建一次增强版 Hermes 镜像：跟踪 NousResearch/hermes-agent 最新 release，
# 在其官方镜像上叠加 vim / tmux / glab / claude code，推送到 GHCR。
#
# 多架构策略：不使用 QEMU。amd64 与 arm64 各在对应的原生 GitHub runner 上构建
# （arm64 用 ubuntu-24.04-arm 原生 runner），按 digest 推送后由 merge 作业
# 合并成多架构 manifest。两个架构都在原生环境下跑冒烟测试。
on:
  schedule:
    # 每周一 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "强制使用的 hermes-agent release tag（留空则自动取最新 release）"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "scripts/smoke-test.sh"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: NousResearch/hermes-agent

permissions:
  contents: read
  packages: write

jobs:
  # ---------- 解析 release tag 与镜像名 ----------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      image: ${{ steps.img.outputs.name }}
    steps:
      - name: 解析 hermes-agent release tag
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          INPUT="${{ github.event.inputs.hermes_version }}"
          if [ -n "${INPUT}" ]; then
            TAG="${INPUT}"; echo "使用手动指定的 tag: ${TAG}"
          else
            TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq .tag_name)"
            echo "自动解析到最新 release: ${TAG}"
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "::error::无法解析 hermes-agent release tag"; exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: 归一化镜像名为小写
        id: img
        run: echo "name=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # ---------- 各架构在原生 runner 上构建 + 冒烟 + 按 digest 推送 ----------
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 计算平台标识
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) 原生构建并 load，跑冒烟测试
      - name: 构建测试镜像 (native, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          build-args: |
            HERMES_VERSION=${{ needs.prepare.outputs.tag }}
          tags: hermes-enhanced:smoke-${{ env.PLATFORM_PAIR }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: 冒烟测试 (${{ matrix.platform }} 原生)
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh hermes-enhanced:smoke-${{ env.PLATFORM_PAIR }}

      # 2) 冒烟通过后按 digest 推送（非 PR）
      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 按 digest 构建并推送
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            HERMES_VERSION=${{ needs.prepare.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hermes Agent enhanced with vim/tmux/glab/claude-code (base ${{ needs.prepare.outputs.tag }})
            org.opencontainers.image.base.name=docker.io/nousresearch/hermes-agent:${{ needs.prepare.outputs.tag }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: 导出 digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: 上传 digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------- 合并成多架构 manifest 并打 tag ----------
  merge:
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 下载各架构 digest
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 创建多架构 manifest 并推送
        working-directory: ${{ runner.temp }}/digests
        env:
          IMG: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          docker buildx imagetools create \
            -t "${IMG}:${TAG}" \
            -t "${IMG}:latest" \
            $(printf "${IMG}@sha256:%s " *)

      - name: 校验 manifest（应含 amd64 + arm64）
        env:
          IMG: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          docker buildx imagetools inspect "${IMG}:${TAG}"

      - name: 构建摘要
        env:
          IMG: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          {
            echo "### ✅ 已推送多架构增强镜像（原生构建，无 QEMU）"
            echo ""
            echo "- 基础 release: \`${TAG}\`"
            echo "- 镜像: \`${IMG}:${TAG}\` / \`${IMG}:latest\`"
            echo "- 架构: linux/amd64 (ubuntu-latest) + linux/arm64 (ubuntu-24.04-arm)"
          } >> "$GITHUB_STEP_SUMMARY"
